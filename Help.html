<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help - Onix Phone Company</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="help-body">

    <h1>Help Center</h1>

    <div class="contact">
        <h2>Contact Us</h2>
        <p>If you need further assistance, please reach out:</p>
        <p>Email: <a href="mailto:onixcompany@gmail.com">onixcompany@gmail.com</a></p>
        <p>Phone: +254715755649</p>
    </div>

    <div class="feedback">
        <h2>Feedback Form</h2>
        <form action="/submit-feedback" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Submit Feedback</button>
        </form>
    </div>

    <div class="navigation">
        <a href="FAQs.html" class="previous">Previous</a>
        <a href="index.html" class="next">Home</a>
    </div>

</body>
</html>
