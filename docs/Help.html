<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Section</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h2 { color: #333; }
        .faq, .contact, .feedback { margin-bottom: 20px; }
        label { display: block; margin-top: 10px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 10px; padding: 10px 15px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>Help Center</h1>
 <div class="contact">
        <h2>Contact Us</h2>
        <p>If you need further assistance, please reach out:</p>
        <p>Email: <a href="mailto:ONIX COMPANY.com">onixcompany@gmailcom</a></p>
        <p>Phone: (123) 456-7890</p>
    </div>

    <div class="feedback">
        <h2>Feedback Form</h2>
        <form action="/submit-feedback" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Submit Feedback</button>
            <button type="cancel">cancel feedback</button>
        </form>
    </div>

</body>
</html>
